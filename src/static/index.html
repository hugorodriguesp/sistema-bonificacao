<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Bonificação e Avaliação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .card-stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card-positive {
            border-left: 5px solid #28a745;
        }
        .card-negative {
            border-left: 5px solid #dc3545;
        }
        .card-warning {
            border-left: 5px solid #ffc107;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .status-excelente {
            color: #28a745;
            font-weight: bold;
        }
        .status-bom {
            color: #17a2b8;
            font-weight: bold;
        }
        .status-regular {
            color: #ffc107;
            font-weight: bold;
        }
        .status-necessita-melhoria {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-chart-line me-2"></i>
                Sistema de Bonificação
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#" onclick="showSection('dashboard')">Dashboard</a>
                <a class="nav-link" href="#" onclick="showSection('atendentes')">Atendentes</a>
                <a class="nav-link" href="#" onclick="showSection('avaliacoes')">Avaliações</a>
                <a class="nav-link" href="#" onclick="showSection('relatorios')">Relatórios</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Dashboard Section -->
        <div id="dashboard-section" class="section">
            <h2><i class="fas fa-tachometer-alt me-2"></i>Dashboard</h2>
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card card-stats">
                        <div class="card-body text-center">
                            <i class="fas fa-users fa-2x mb-2"></i>
                            <h4 id="total-atendentes">0</h4>
                            <p>Total de Atendentes</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card card-stats">
                        <div class="card-body text-center">
                            <i class="fas fa-star fa-2x mb-2"></i>
                            <h4 id="total-avaliacoes">0</h4>
                            <p>Total de Avaliações</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card card-stats">
                        <div class="card-body text-center">
                            <i class="fas fa-trophy fa-2x mb-2"></i>
                            <h4 id="media-pontuacao">0</h4>
                            <p>Média de Pontuação</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card card-stats">
                        <div class="card-body text-center">
                            <i class="fas fa-award fa-2x mb-2"></i>
                            <h4 id="top-performer">-</h4>
                            <p>Melhor Desempenho</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-chart-bar me-2"></i>Ranking de Desempenho</h5>
                        </div>
                        <div class="card-body">
                            <div id="ranking-list"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-clock me-2"></i>Avaliações Recentes</h5>
                        </div>
                        <div class="card-body">
                            <div id="recent-evaluations"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Atendentes Section -->
        <div id="atendentes-section" class="section" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-users me-2"></i>Atendentes</h2>
                <button class="btn btn-primary" onclick="showAddAtendenteModal()">
                    <i class="fas fa-plus me-2"></i>Novo Atendente
                </button>
            </div>
            <div class="card">
                <div class="card-body">
                    <div id="atendentes-list"></div>
                </div>
            </div>
        </div>

        <!-- Avaliações Section -->
        <div id="avaliacoes-section" class="section" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-star me-2"></i>Avaliações</h2>
                <button class="btn btn-success" onclick="showAddAvaliacaoModal()">
                    <i class="fas fa-plus me-2"></i>Nova Avaliação
                </button>
            </div>
            <div class="card">
                <div class="card-body">
                    <div id="avaliacoes-list"></div>
                </div>
            </div>
        </div>

        <!-- Relatórios Section -->
        <div id="relatorios-section" class="section" style="display: none;">
            <h2><i class="fas fa-chart-pie me-2"></i>Relatórios</h2>
            <div class="card">
                <div class="card-body">
                    <div id="relatorio-desempenho"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Novo Atendente -->
    <div class="modal fade" id="addAtendenteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Atendente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addAtendenteForm">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="nome" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="cargo" class="form-label">Cargo</label>
                            <input type="text" class="form-control" id="cargo" value="Atendente">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="addAtendente()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Nova Avaliação -->
    <div class="modal fade" id="addAvaliacaoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nova Avaliação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addAvaliacaoForm">
                        <div class="mb-3">
                            <label for="atendente_select" class="form-label">Atendente</label>
                            <select class="form-select" id="atendente_select" required>
                                <option value="">Selecione um atendente</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="criterio_select" class="form-label">Critério</label>
                            <select class="form-select" id="criterio_select" required>
                                <option value="">Selecione um critério</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="pontuacao" class="form-label">Pontuação</label>
                            <input type="number" class="form-control" id="pontuacao" required>
                        </div>
                        <div class="mb-3">
                            <label for="observacoes" class="form-label">Observações</label>
                            <textarea class="form-control" id="observacoes" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="avaliador" class="form-label">Avaliador</label>
                            <input type="text" class="form-control" id="avaliador" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" onclick="addAvaliacao()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
